services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/matiasinsaurralde/website:latest
    # Consider pinning to a digest (image@sha256:...) for supply-chain safety.
    container_name: website
    restart: always
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 200
    networks:
      - internal
    # Remove port exposure since Nginx will proxy to internal network

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    read_only: true
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,size=64m
      - /var/run:rw,noexec,nosuid,size=16m
      - /etc/nginx/conf.d:rw,noexec,nosuid,size=1m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    pids_limit: 200
    ports:
      - "0.0.0.0:80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - X_ORIGIN_VERIFY=${X_ORIGIN_VERIFY:?set X_ORIGIN_VERIFY in .env}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./logs:/var/log/nginx
    depends_on:
      - website
    networks:
      - internal

networks:
  internal:
    driver: bridge
